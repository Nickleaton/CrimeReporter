      Text: |

        A murder investigation into the death of Halyna Hoisan, a 29-year-old woman in Greenwich,
        has led to the charge of 33-year-old Yurii Muzyka with murder.
        
        The incident occurred on Wednesday, 27 August, when police responded to reports of a stabbing 
        at a residential address. Despite the efforts of emergency services, Halyna was pronounced 
        dead at the scene. Her family is receiving support from specialist officers.
        
        Muzyka has been remanded in custody and is scheduled to appear at Bromley Magistrates’ Court 
        on Saturday, 6 September.
        
