<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Article Table</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <style>
    table { width: 90%; margin: 20px auto; }
  </style>
</head>
<body>

<h2 style="text-align:center;">Article Table</h2>

<table id="articleTable" class="display">
  <thead>
    <tr>
      <th>Date</th>
      <th>Force</th>
      <th>Title</th>
      <th>Local</th>
      <th>Source</th>
    </tr>
  </thead>
  <tbody>
    {% for article in articles %}
    <tr>
      <td>{{ article.date }}</td>
      <td>{{ article.force_name }}</td>
      <td>{{ article.title }}</td>
      <td><a href="file:///{{ article.filename }}">Local</a></td>
      <td><a href="{{ article.url }}">Source</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<script>
  $(document).ready(function() {
    $('#articleTable').DataTable({
      paging: true,
      searching: true,
      ordering: true,
      pageLength: 100,
      order: [[0, 'desc'], [1, 'asc'], [2, 'asc']],  // Sort by Date DESC, Force ASC, Title ASC
      columnDefs: [
        { orderable: false, targets: 3 }  // Disable sorting on Source column
      ]
    });
  });
</script>

</body>
</html>
