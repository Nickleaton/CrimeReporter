Segments:  
  - Segment:  
      Image: charlottewinstanley.jpeg  
      Text: |  
        Prison officer Charlotte Winstanley was jailed for two years and six months after engaging in a romantic relationship with inmate Jabhari Blair while working at HMP Lindholme.
        The scandal unfolded after prison staff discovered their relationship through CCTV footage, phone analysis, and searches of Blair’s cell, which revealed cannabis, a smuggled phone, and a USB stick.
        Winstanley admitted to sharing intimate messages and facilitating the phone’s entry into the prison.
  - Segment:
      Image: img.png
      Text: |          
        Blair pleaded guilty to drug possession and illegal phone and USB possession, receiving a 13-month sentence consecutive to his 12-year term.
        Migrant Blair was jailed in 2014 for 12 and a half years for violent offences linked to organised crime. Now that in itself is interesting. 
        He's not been released on parole, even though he would have been coming up for automatic release anyway at the end of his sentence. 
        That tells me he's dangerous. 

