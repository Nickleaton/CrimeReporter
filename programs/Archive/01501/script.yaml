      Text: |  
        A 38-year-old Brazilian man, Rafael Nascimento, was found guilty of raping a boy in Brighton.
        Nascimento approached the victim on Dyke Road, lured him to a flat in Regent Hill, and committed the crime. 
        He was arrested immediately, charged with multiple counts, and convicted of four rapes and inciting sexual activity.
        The victim’s prompt reporting enabled a swift arrest.
        Nascimento faces sentencing in April 2025.   
