      Image: cash_0.jpg  
      Text: |  
        A 25-year-old drug dealer, Curtis Clark, has been ordered to repay nearly £400,000 or face an additional four-year jail term. 
        The Proceeds of Crime Act hearing at Leeds Crown Court mandated he repay £393,363.77 within three months. 
        Clark, linked to an organized crime group, was previously sentenced to 65 months for drug supply and money laundering.

  - Segment:
      Image: cash_0.jpg
      Text: |          
        Police seized £270k cash, two cars, designer clothing, and three Rolex watches during searches in 2024. 
          
