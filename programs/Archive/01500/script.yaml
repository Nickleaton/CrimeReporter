      Text: |  
        A 21-year-old failed Egyptian asylum seeker, Eid Anwar Fathi Najjar, was jailed for eight years after raping a woman during a night out in York.
        The attack occurred on 6 July 2025 when he lured the victim from a club into an alleyway. 
        Door staff warned him to stay away, but he assaulted her. 
        Two tourists found her half naked from the waist down and in distress and alerted police. 
        
        When arrested Najjar gave a false name and date of birth.
        Then it was the sex was consensual. 
        
        An investigation involving 20 officers, 191 CCTV clips, and forensic evidence led to his conviction.
        With overwhelming evidence against him he pled guilty.
        
        Charges against Mohammed Abrahim Abuzet were dropped before the case went to trial because the CPS decided they couldn't convict him. 
          
        Najjar arrived on a boat 3 years ago. Given that tens of thousands of people go from the UK and other countries to Egypt on holiday
        its not a war torn country.  He had failed to get asylum but the Home Office had failed to deport him. 
        So we have another victim of that Home Office Failure
