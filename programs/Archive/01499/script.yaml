      Text: |  
        Two men have been charged with the murder of 24-year-old Jonah Ho-Shue in London.
        The victim died from a single stab wound to the arm on 4 January 2024.
        That just shows you how dangerous knives can be. 
        
        James Thompson and Dante Ashley, both arrested in January 2024, face murder charges, with Ashley also accused of perverting the course of justice.
        
        A couple of weeks ago the Police offered a £20,000 reward for information about the murder. 
        It may well be someone is going to be twenty grand better off. 
        
