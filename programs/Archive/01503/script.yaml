      Text: |  
        Stanislaw Pozniecki was sentenced to four years and nine months in prison after sexually assaulting a 25-year-old woman on a London Underground train. 
        The incident occurred on 2 January 2022, when Pozniecki targeted a lone female passenger, woke her, then sexually assaulted her before offering £20 for sex.
        The victim alerted rail staff, leading to his arrest.
        The court imposed a 15-year Sexual Harm Prevention Order, banning him from approaching women on public transport.

