      Text: |  
        Dwayne Zungunde was jailed for eight months after a high-speed chase near Cwmbran left a lorry and car damaged. 
        He collided with vehicles while fleeing police at 100mph, admitting to multiple driving offenses including dangerous driving and no insurance.  

        Officers from Gwent Police had spotted a black Volkswagen Golf in Pontypool. 
        Zungunde then attempted to overtake queued traffic, causing a collision with a lorry and car. 
        
        Zungunde, of no fixed abode, pleaded guilty to driving dangerously, failing to stop for police, unlicensed driving, and no insurance.  

        He received an 8-month prison sentence, a 2-year 4-month driving ban, and must take an extended test to reapply for his license.  

