      Text: |  
        Iranian rapist Kasra Esmaelie was caught with hidden mobile phones in his cell at HMP Isle of Wight twice within two days. 
        
        The offender, serving a 13-year sentence for a 2021 kidnap and rape in Slough, pleaded guilty to possessing phones in prison.
        
        He also faces a five-year sentence for indecent child image offenses.
        
        Magistrates imposed two eight-week sentences alongside his existing terms, with deportation to Iran pending after his release in 2031.
        
        The victim endured a horrendous attack after being injected with heroin and raped in a public car park.
        
