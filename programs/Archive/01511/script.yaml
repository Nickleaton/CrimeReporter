        A rail staff member was attacked with a chemical substance at Blackfriars station, causing severe burns and vision loss.
        Four men approached the victim, one squirted a clear liquid onto his face, and all fled. 
        The victim was hospitalized with chemical burns.   
        Call 101 or Crime Stoppers if  you know who he is.
        
