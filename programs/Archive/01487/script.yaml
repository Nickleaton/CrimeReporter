      Text: |  
        A 27-year-old man was sentenced to two years in prison after being caught dealing drugs in broad daylight in Cambridge. 
        Police responded to a report of dealing on Regent Terrace.
        Guy was found distributing small drug packets from a car's boot.
        Despite fleeing initially, he later returned topless and was arrested. 
        The seized drugs included class A and B substances.
          
