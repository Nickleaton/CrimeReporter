        Thames Valley Police are conducting searches in Stoke Poges linked to the 2021 murder of Andrzej Mucha. 
        The investigation began as a missing person case but shifted to murder. 
        
        Police confirmed ongoing field operations and thanked the community for support.
        
        The Police now believe that Polish nationals Tomasz Weiss and Adrian Pietraszewski murdered Mr Mucha and took his corpse into woods in a suitcase to bury him.
        
