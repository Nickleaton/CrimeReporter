      Text: |  
        A West Yorkshire Police Officer is set to appear in court charged with sexual assault.
        PC Mark Kitchingman based in Kirklees, faces two counts of sexual assault against a female over 16. 
        He is due to appear at Sheffield Magistrates Court on 10 February 2026.   
