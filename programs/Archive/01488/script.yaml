      Text: |  
        A story at the end about Harrods. 
        
        A burglar who pretended to be supermarket staff to commit thefts has been jailed for a year. 
        William Fletcher broke into Asda and B&Q in Peterborough, stealing £1,000 in cigarettes, £1,300 in alcohol, and tools worth over £2,000.
        He also stole an e-bike and milkshake. 
        Fletcher admitted four burglaries and thefts leading to a 12-month prison sentence.
        
        Going back there was a case at Harrods during their sale. 
        Criminals got Harrods uniforms. Turned up with wrapping paper and bags, a temporary table and a cash only sign and then set up in the china department. 
        Worked like mad, and at the end of the day just walked out with the cash. 
        What was really funny was that Al Fayed walking around the store thanked them personally for their efforts.
        
        
