      Text: |  
        PC Mark Roberts was found guilty of causing death by dangerous driving after colliding with a motorcycle during an emergency response.
        
        The incident occurred on Dunston Road Gateshead.
        
        PC Mark Roberts ran a red light and smashed into a motorcycle being ridden by a married couple. 
        
        The rider Ronald Pinkey and his wife Muriel were thrown into the air resulting in serious injuries.
        
        Ronald survived but his wife was killed from head and neck injuries. Ronald suffered multiple fractures. 
        
        The collision was filmed on Ronald's helmet camera, as well as on another dash cam.
        
        The prosecution argued successfully that Roberts driving fell far below the expected standard, violating police protocols and traffic regulations.
        
        The jury also returned a verdict in under an hour. 
        
        He's now been suspended from the police and will be sentenced at the start of April. 
        
