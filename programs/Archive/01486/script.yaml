      Text: |  
        Another two bite the dust. 
        Two Metropolitan Police officers, PC Jerome Beasley and PC Luke Robinson, were dismissed without notice for gross misconduct after repeatedly and inappropriately touching a female colleague's breasts while off duty at the Hippodrome Casino in Westminster.
        
        At an earlier court case, Robinson, a father of two from Northamptonshire, pleaded guilty to three counts of sexual assault. 
        Beasley, also a father of two from Brent pleaded guilty to four counts, three relating to the Hippodrome incident and one in January 2020.
        
        So Beasley is a serial offender. 
        
        Beasley was given a 15-month jail sentence, suspended for two years. Robinson was jailed for 13 months, also suspended for two years. 
        Both were ordered to complete 250 hours of unpaid work and 30 hours of rehabilitation activity.
        An overnight curfew was also imposed on both men for five months. 
        They were each given a five-year restraining order and told to pay £750 compensation to one of the victims.
        
        So how many other victims are there out there? Remember they assaulted a female police officer. 
        What about other women, for example those who were arrested or came in for police help? 
          
