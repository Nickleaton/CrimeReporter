        An 18-year-old man has been arrested on suspicion of murder following the stabbing of a university student in Leicester city centre. 
        The incident occurred shortly after 5pm on Tuesday near De Montfort University on Oxford Street, close to Bonners Lane. 
        The victim, a student in his 20s, was stabbed during an altercation and was taken to Leicester Royal Infirmary, where he later died. 
        
        Police are investigating the circumstances and reviewing CCTV while appealing to witnesses for information.
        
