      Text: |  
        A 15-year-old boy has been charged with murder after 16-year-old Shayne Hambakachere died from injuries sustained in an attack on January 31. 
        The victim, a student at Hardenhuish School, was found seriously hurt on London Road, Chippenham. 
        The teenager was arrested on suspicion of grievous bodily harm and later charged with murder.
        He remains in custody and is due to appear before Swindon Magistrates. 

