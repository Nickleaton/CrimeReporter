      Text: |  
        Migrant Trad Almaghrabi was sentenced to 10 years in prison for causing a fatal crash on the M40. 
        Driving at speeds of 135-146mph, he struck a Volkswagen Golf, killing 27-year-old Naweed Hussain and seriously injuring his passenger. 
        Almaghrabi fled the scene, leaving the victim for dead. 
        Police recovered evidence linking him to the crash, including cannabis and a nitrous oxide canister. 
        The court ordered him to be disqualified from driving for 11 years and pay £1,000 in costs.   

