Commands:
  - name: Grab
    command: "python scripts\\grab.py grab"
    refresh: false

  - name: AIDownload
    command: "python scripts\\news.py aidownload -s {source} -i {identifier}"
    refresh: true

  - name: Compose
    command: "python scripts\\news.py compose_image -p {program}"

  - name: Template
    command: "python scripts\\news.py template"
    refresh: true

  - name: Preview
    command: "python scripts\\news.py compose_image validate text thumbnail html -p {program}"
    refresh: false

  - name: Video
    command: "python scripts\\news.py compose_image validate text thumbnail html audio video -p {program}"
    refresh: false

  - name: Publish
    command: "python scripts\\news.py compose_image validate text thumbnail html audio video youtube xpost blueskypost -p {program}"
    refresh: false

  - name: Youtube
    command: "python scripts\\news.py validate youtube -p {program}"
    refresh: false

  - name: PostAll
    command: "python scripts\\news.py validate xpost blueskypost -p {program}"
    refresh: false

  - name: PostX
    command: "python scripts\\news.py validate xpost -p {program}"
    refresh: false

  - name: PlayList
    command: "python scripts\\news.py playlist -p {program}"
    refresh: false

  - name: Archive
    command: "python scripts\\news.py archive -p {program}"
    refresh: false

