root: D:\PycharmProjects\CrimeReportData
database_url: sqlite:///cache.db
logging:
  version: 1
  disable_existing_loggers: false
  formatters:
    default:
      format: '%(asctime)s - %(name)-40s - %(levelname)-8s - %(message)s'
      datefmt: '%Y-%m-%d %H:%M:%S'
  handlers:
    console:
      class: logging.StreamHandler
      formatter: default
      level: INFO
    youtube_file:
      class: logging.FileHandler
      formatter: default
      level: INFO
      filename: D:/PycharmProjects/CrimeReportData/logs/youtube.log
      encoding: utf-8
    audio_file: # <-- new handler
      class: logging.FileHandler
      formatter: default
      level: INFO
      filename: D:/PycharmProjects/CrimeReportData/logs/audio.log
      encoding: utf-8
    ai_file: # <-- new handler for AI calls
      class: logging.FileHandler
      formatter: default
      level: INFO
      filename: D:/PycharmProjects/CrimeReportData/logs/ai.log
      encoding: utf-8
  root:
    level: INFO
    handlers: [ console ]
  loggers:
    call.logger.youtube:
      level: INFO
      handlers: [ youtube_file ]
      propagate: false
    call.logger.audio:
      level: INFO
      handlers: [ audio_file ]
      propagate: false
    call.logger.ai:
      level: INFO
      handlers: [ ai_file ]
      propagate: false
    httpx:
      level: WARNING
      propagate: false
pages:
  index: 'http://localhost:8000/downloads/index.html'

# Number of days to include in the index

index_days: 7

# Checks on lengths of strings
validation:
  # To fix on screen
  maximum_title: 50
  # To fix on screen
  maximum_thumbnail_line: 50
  # Needed to be capped for posting to x etc
  maximum_description: 300

# Logging of all message, and roll over
log:
  min_lines: 2000
  max_lines: 10000
  launcher_log: logs/launcher.log
