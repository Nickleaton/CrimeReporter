launcher:
  geometry: "1200x700"
port: 8000
youtube:
  find_by_title: False
  sleep_after_upload: 15
bluesky:
  maximum_image_size: 1000000
#youtube_secrets: keys/youtube_secrets.json
#speech_to_text: keys/tts-key.json
ai_command: Ollama
extractor: Trafilatura
engines:
  - engine:
      name: OpenAI
#      open_ai_api_key_file: keys/openai.json
      model: gpt-4o-mini
  - engine:
      name: Ollama
      model: qwen3:8b
image_extensions:
  - ".png"
  - ".bmp"
  - ".jpg"
  - ".jpeg"
  - ".gif"
  - ".webp"
audio:
  engine: GCPTextToSpeech
  voice: en-GB-Neural2-A
  language: en
  options: ""
  language_code: en-UK
  voice_gender: FEMALE
