repos:
  - repo: https://github.com/psf/black
    rev: 25.12.0
    hooks:
      - id: black  # Black will read pyproject.toml automatically

  - repo: https://github.com/PyCQA/isort
    rev: 7.0.0
    hooks:
      - id: isort
        args: ["--profile", "black"]  # line length comes from Black config

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8  # uses pyproject.toml via flake8-pyproject
        additional_dependencies: [flake8-pyproject]
